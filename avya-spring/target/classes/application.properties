# ─── SERVER ───────────────────────────────────────────────────
server.port=8080
spring.application.name=avya-home-crm

# ─── DATABASE (MySQL) ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/avya_home_crm?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# HikariCP pool (replaces mysql2 pool)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate — update only; schema is managed by schema.sql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ─── JWT SECRETS ──────────────────────────────────────────────
app.jwt.secret=avya_home_super_secret_jwt_key_2026_change_this_in_production_must_be_32chars
app.jwt.expiration-ms=86400000
app.jwt.refresh-secret=avya_home_refresh_secret_2026_change_this_in_production_must_be_32chars
app.jwt.refresh-expiration-ms=604800000
app.jwt.issuer=avya-home-crm

# ─── OTP ──────────────────────────────────────────────────────
app.otp.expires-minutes=10

# ─── SMTP / EMAIL ─────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=yourcompany@gmail.com
spring.mail.password=your_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── COMPANY SETTINGS ─────────────────────────────────────────
app.company.name=Avya Home Private Limited
app.company.email=info@avyahome.com
app.associate.id-prefix=AH
app.associate.id-start=10001

# ─── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000

# ─── RATE LIMIT ───────────────────────────────────────────────
# Implemented programmatically in RateLimitFilter
app.rate-limit.global-max=200
app.rate-limit.global-window-minutes=15
app.rate-limit.login-max=10
app.rate-limit.otp-max=5
app.rate-limit.otp-window-minutes=60

# ─── MULTIPART ────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── SWAGGER / OPENAPI ────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.persistAuthorization=true

# ─── ADMIN SEED (used only on first run) ──────────────────────
app.admin.mobile=9999999999
app.admin.password=Admin@123
app.admin.name=Avya Home Admin
app.admin.email=admin@avyahome.com



logging.level.com.avyahome.crm=DEBUG