# ─── SERVER ───────────────────────────────────────────────────
server.port=8080
spring.application.name=avya-home-crm

# ─── DATABASE (MySQL) ─────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/avya_home_crm?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Kolkata
spring.datasource.username=${DB_USER:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ─── JWT ──────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:}
app.jwt.refresh-secret=${JWT_REFRESH_SECRET:}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000
app.jwt.issuer=avya-home-crm

# ─── OTP ──────────────────────────────────────────────────────
app.otp.expires-minutes=10

# ─── SMTP / EMAIL ─────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ─── COMPANY SETTINGS ─────────────────────────────────────────
app.company.name=Avya Home Private Limited
app.company.email=info@avyahome.com
app.associate.id-prefix=AH
app.associate.id-start=10001

# ─── CORS ─────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000

# ─── RATE LIMIT ───────────────────────────────────────────────
app.rate-limit.global-max=200
app.rate-limit.global-window-minutes=15
app.rate-limit.login-max=10
app.rate-limit.otp-max=5
app.rate-limit.otp-window-minutes=60

# ─── MULTIPART ────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── SWAGGER / OPENAPI ────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.persistAuthorization=true

# ─── ADMIN SEED (first run only) ──────────────────────────────
app.admin.mobile=${APP_ADMIN_MOBILE:}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.admin.email=${APP_ADMIN_EMAIL:}
app.admin.name=${APP_ADMIN_NAME:}

logging.level.com.avyahome.crm=DEBUG